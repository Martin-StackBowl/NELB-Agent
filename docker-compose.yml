services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nelb:nelb_dev_password@db:5432/nelb
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nelb
      POSTGRES_PASSWORD: nelb_dev_password
      POSTGRES_DB: nelb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nelb -d nelb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
